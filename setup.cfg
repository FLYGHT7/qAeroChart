[flake8]
max-line-length = 119
exclude =
    .git,
    __pycache__,
    .venv,
    tests

per-file-ignores =
    # Compact aeronautical math scripts — intentional dense formatting and star imports.
    # Unblocked by: full script refactor (no planned date)
    qAeroChart/scripts/*.py: F401,F403,F405,E111,E128,E129,E201,E202,E203,E211,E221,E225,E231,E402,E501,E702,F541,F841,W291
    # Generated/legacy UI files — no active maintenance
    # Unblocked by: UI regeneration from .ui files
    qAeroChart/ui/profile_creation_dialog_gen.py: F401,E501
    qAeroChart/ui/profile_creation_dialog_ui.py: F401,E501
    qAeroChart/qaerochart_dockwidget_base.py: E128
